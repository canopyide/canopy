name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_notarization:
        description: "Skip macOS notarization (use when Apple's service is down)"
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Dry run — exercise the full pipeline (gates + build + sign + notarize) without publishing to R2, Microsoft Store, or the website"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

  unit-tests:
    name: Unit Tests (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: Linux
          - os: macos-14
            name: macOS
          - os: windows-latest
            name: Windows
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: npm ci
        env:
          npm_config_msvs_version: "2022"

      - name: Install dependencies
        if: matrix.os != 'windows-latest'
        run: npm ci

      - name: Test
        run: npm run test

  e2e-core-gate:
    needs: [checks, unit-tests]
    uses: ./.github/workflows/e2e.yml
    with:
      suite: core
      platform: all

  # Fan out the six full-* domain buckets as a matrix of reusable-workflow
  # calls. GitHub Actions waits on every matrix entry before unblocking
  # `build-daintree`, so a single `needs: [..., e2e-full-gate]` is enough.
  #
  # Releases gate on all three OSes here so Windows-only regressions can't
  # ship. The nightly job validates the same surface daily (see nightly.yml)
  # so this isn't a cold path — Windows full has been green in nightly.
  e2e-full-gate:
    needs: [checks, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        suite:
          - full-terminal
          - full-worktree
          - full-presets
          - full-platform
          - full-panels
          - full-resilience
    uses: ./.github/workflows/e2e.yml
    with:
      suite: ${{ matrix.suite }}
      platform: all

  e2e-online-gate:
    needs: [checks, unit-tests]
    uses: ./.github/workflows/e2e.yml
    with:
      suite: online
      platform: all
    secrets: inherit

  build-daintree:
    needs: [checks, unit-tests, e2e-core-gate, e2e-full-gate, e2e-online-gate]
    name: Build Daintree (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-22.04, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve update metadata prefix
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PKG_VERSION" == *-rc* ]]; then
            echo "UPDATE_METADATA_PREFIX=rc" >> "$GITHUB_ENV"
          elif [[ "$PKG_VERSION" == *-beta* ]]; then
            echo "UPDATE_METADATA_PREFIX=beta" >> "$GITHUB_ENV"
          else
            echo "UPDATE_METADATA_PREFIX=latest" >> "$GITHUB_ENV"
          fi

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: npm ci
        env:
          npm_config_msvs_version: "2022"

      - name: Install dependencies
        if: matrix.os != 'windows-latest'
        run: npm ci

      # Cross-compile win-job-object (source-only N-API addon) for arm64 so the
      # NSIS combined installer can ship both archs. node-pty and better-sqlite3
      # have arm64 prebuilts; electron-builder pulls those via npmRebuild during
      # packaging. The post-install copy of node-pty's conpty win10-arm64 DLLs
      # is recovered by `scripts/afterPack.cjs` based on `context.arch`.
      - name: Cross-compile arm64 native modules (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          npm_config_msvs_version: "2022"
        run: npm run rebuild:win-arm64

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libarchive-tools \
            libxss-dev \
            libsecret-1-dev \
            libnss3-dev \
            libnotify-dev \
            libxkbfile-dev

      - name: Import macOS certificates
        if: startsWith(matrix.os, 'macos')
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.MAC_CERTS }}
          p12-password: ${{ secrets.MAC_CERTS_PASSWORD }}
          keychain-password: ${{ secrets.MAC_CERTS_PASSWORD }}

      - name: Prepare Apple API key
        if: startsWith(matrix.os, 'macos')
        run: |
          mkdir -p "$RUNNER_TEMP/apple"
          printf '%s' "$APPLE_API_KEY_CONTENT" > "$RUNNER_TEMP/apple/AuthKey.p8"
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}

      - name: Build (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          CSC_LINK: ${{ secrets.MAC_CERTS }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/apple/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DEBUG: electron-builder,electron-notarize*,electron-osx-sign*
          npm_config_build_from_source: "true"
        run: |
          npm run build
          PUBLISH_FLAG="always"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "::warning::Dry run — skipping publish to electron-builder targets"
            PUBLISH_FLAG="never"
          fi
          EXTRA_ARGS=""
          if [ "${{ inputs.skip_notarization }}" = "true" ]; then
            echo "::warning::Skipping macOS notarization (manually disabled)"
            EXTRA_ARGS="-c.mac.notarize=false"
          fi
          npx electron-builder --config electron-builder.config.cjs --publish "$PUBLISH_FLAG" -c.buildDependenciesFromSource=true $EXTRA_ARGS

      - name: Verify macOS notarization staple
        if: startsWith(matrix.os, 'macos') && inputs.skip_notarization != true
        shell: bash
        run: |
          set -euo pipefail
          # x64 has no arch suffix because electron-builder treats it as the default arch
          # (builder-util getArchSuffix returns "" for the default); arm64 and universal do.
          apps=(
            "release/mac-arm64/Daintree.app"
            "release/mac/Daintree.app"
            "release/mac-universal/Daintree.app"
          )
          for app in "${apps[@]}"; do
            if [[ ! -d "$app" ]]; then
              echo "::error::Missing expected macOS app bundle: $app"
              exit 1
            fi
            echo "--- codesign: $app"
            codesign --verify --deep --strict --verbose=4 "$app"
            echo "--- stapler validate: $app"
            xcrun stapler validate "$app"
            echo "--- spctl (diagnostic only): $app"
            spctl --assess --type execute --verbose --ignore-cache --no-cache "$app" || true
          done

      - name: Build
        if: ${{ !startsWith(matrix.os, 'macos') }}
        shell: bash
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          DEBUG: electron-builder,electron-notarize*,electron-osx-sign*
        run: |
          npm run build
          PUBLISH_FLAG="always"
          if [ "${{ matrix.os }}" = "windows-latest" ] || [ "${{ inputs.dry_run }}" = "true" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ] && [ "${{ matrix.os }}" != "windows-latest" ]; then
              echo "::warning::Dry run — skipping publish to electron-builder targets"
            fi
            PUBLISH_FLAG="never"
          fi
          npx electron-builder --config electron-builder.config.cjs --publish "$PUBLISH_FLAG"

      - name: Verify Windows Store package was built
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem -Path 'release\*.appx', 'release\*.msix' -ErrorAction SilentlyContinue)
          if ($packages.Count -eq 0) {
            Write-Host "::error::No .appx or .msix found in release/. Confirm electron-builder is configured with the appx target (see #7198)."
            Get-ChildItem -Path release -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.Name }
            exit 1
          }
          Write-Host "Found $($packages.Count) Store package(s) in release/"

      - name: Verify Windows NSIS installer was built
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $installers = @(Get-ChildItem -Path 'release\*.exe' -ErrorAction SilentlyContinue)
          if ($installers.Count -ne 1) {
            Write-Host "::error::Expected exactly 1 NSIS .exe in release/, found $($installers.Count). Confirm electron-builder.config.cjs lists the nsis target."
            Get-ChildItem -Path release -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.Name }
            exit 1
          }
          Write-Host "Found NSIS installer: $($installers[0].Name) ($([math]::Round($installers[0].Length / 1MB, 1)) MB)"

      - name: Run WACK (Windows, best-effort)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        continue-on-error: true
        run: |
          $appx = Get-ChildItem -Path release -Filter *.appx -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $appx) {
            $appx = Get-ChildItem -Path release -Filter *.msix -ErrorAction SilentlyContinue |
              Select-Object -First 1
          }
          if (-not $appx) {
            Write-Host "::warning::No .appx or .msix found in release/ — skipping WACK"
            exit 0
          }
          $appcert = Join-Path ${env:ProgramFiles(x86)} 'Windows Kits\10\App Certification Kit\appcert.exe'
          if (-not (Test-Path $appcert)) {
            Write-Host "::warning::WACK (appcert.exe) not found at $appcert — skipping"
            exit 0
          }
          $report = Join-Path $env:RUNNER_TEMP 'wack-report.xml'
          & $appcert test -appxpackagepath $appx.FullName -reportoutputpath $report
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::WACK reported issues (exit $LASTEXITCODE). Microsoft re-runs WACK during certification — see $report for details."
          }

      - name: Check Microsoft Store secrets (Windows)
        id: store-secrets
        if: matrix.os == 'windows-latest' && inputs.dry_run != true
        shell: pwsh
        env:
          PARTNER_CENTER_TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          PARTNER_CENTER_CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          PARTNER_CENTER_CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
          STORE_PRODUCT_ID: ${{ secrets.STORE_PRODUCT_ID }}
        run: |
          $configured = -not [string]::IsNullOrEmpty($env:PARTNER_CENTER_TENANT_ID) `
            -and -not [string]::IsNullOrEmpty($env:PARTNER_CENTER_SELLER_ID) `
            -and -not [string]::IsNullOrEmpty($env:PARTNER_CENTER_CLIENT_ID) `
            -and -not [string]::IsNullOrEmpty($env:PARTNER_CENTER_CLIENT_SECRET) `
            -and -not [string]::IsNullOrEmpty($env:STORE_PRODUCT_ID)
          $value = if ($configured) { 'true' } else { 'false' }
          "configured=$value" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          if (-not $configured) {
            Write-Host "::notice::Microsoft Store submission skipped — PARTNER_CENTER_* and STORE_PRODUCT_ID secrets not configured. The .appx is still built and archived to R2."
          }

      - name: Install Microsoft Store CLI (Windows)
        if: matrix.os == 'windows-latest' && inputs.dry_run != true && steps.store-secrets.outputs.configured == 'true'
        uses: microsoft/microsoft-store-apppublisher@v1.3

      - name: Submit to Microsoft Store (Windows)
        if: matrix.os == 'windows-latest' && inputs.dry_run != true && steps.store-secrets.outputs.configured == 'true'
        shell: pwsh
        env:
          PARTNER_CENTER_TENANT_ID: ${{ secrets.PARTNER_CENTER_TENANT_ID }}
          PARTNER_CENTER_SELLER_ID: ${{ secrets.PARTNER_CENTER_SELLER_ID }}
          PARTNER_CENTER_CLIENT_ID: ${{ secrets.PARTNER_CENTER_CLIENT_ID }}
          PARTNER_CENTER_CLIENT_SECRET: ${{ secrets.PARTNER_CENTER_CLIENT_SECRET }}
          STORE_PRODUCT_ID: ${{ secrets.STORE_PRODUCT_ID }}
        run: |
          msstore reconfigure `
            --tenantId $env:PARTNER_CENTER_TENANT_ID `
            --sellerId $env:PARTNER_CENTER_SELLER_ID `
            --clientId $env:PARTNER_CENTER_CLIENT_ID `
            --clientSecret $env:PARTNER_CENTER_CLIENT_SECRET
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::msstore reconfigure failed (exit $LASTEXITCODE)"
            exit $LASTEXITCODE
          }
          msstore publish . --appId $env:STORE_PRODUCT_ID --inputDirectory .\release
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::msstore publish failed (exit $LASTEXITCODE). If the failure is 'unknown command,' the CLI grammar may have shifted — run 'msstore --help' on the runner and update this step."
            exit $LASTEXITCODE
          }

      - name: Validate update metadata (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          node scripts/ci/generate-update-metadata.mjs mac "release/${UPDATE_METADATA_PREFIX}-mac.yml"
          if [ ! -f "release/${UPDATE_METADATA_PREFIX}-mac.yml" ]; then
            echo "::error::Missing release/${UPDATE_METADATA_PREFIX}-mac.yml - macOS auto-update metadata was not generated"
            exit 1
          fi
          DMG_COUNT=$(find release -maxdepth 1 -name '*.dmg' | wc -l | tr -d ' ')
          ZIP_COUNT=$(find release -maxdepth 1 -name '*.zip' | wc -l | tr -d ' ')
          if [ "$DMG_COUNT" -ne 3 ] || [ "$ZIP_COUNT" -ne 3 ]; then
            echo "::error::Expected 3 DMGs and 3 ZIPs, got $DMG_COUNT DMGs and $ZIP_COUNT ZIPs"
            find release -maxdepth 1 \( -name '*.dmg' -o -name '*.zip' \) -exec ls -la {} +
            exit 1
          fi
          echo "✓ Found $DMG_COUNT DMGs, $ZIP_COUNT ZIPs, and ${UPDATE_METADATA_PREFIX}-mac.yml"
          node scripts/ci/validate-update-metadata.mjs "release/${UPDATE_METADATA_PREFIX}-mac.yml"

      - name: Validate update metadata (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          node scripts/ci/generate-update-metadata.mjs linux "release/${UPDATE_METADATA_PREFIX}-linux.yml"
          if [ ! -f "release/${UPDATE_METADATA_PREFIX}-linux.yml" ]; then
            echo "::error::Missing release/${UPDATE_METADATA_PREFIX}-linux.yml - Linux auto-update metadata was not generated"
            exit 1
          fi
          node scripts/ci/validate-update-metadata.mjs "release/${UPDATE_METADATA_PREFIX}-linux.yml"

      - name: Validate update metadata (Windows NSIS)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          # electron-updater on Windows polls `<channel>.yml` (no platform
          # suffix) — Provider.js getChannelFilePrefix() returns "" for win32.
          # This is the canonical filename installed clients fetch, so we
          # generate (and validate) it here even though electron-builder's
          # packaging step already wrote a copy.
          node scripts/ci/generate-update-metadata.mjs windows "release/${UPDATE_METADATA_PREFIX}.yml"
          if [ ! -f "release/${UPDATE_METADATA_PREFIX}.yml" ]; then
            echo "::error::Missing release/${UPDATE_METADATA_PREFIX}.yml - Windows auto-update metadata was not generated"
            exit 1
          fi
          node scripts/ci/validate-update-metadata.mjs "release/${UPDATE_METADATA_PREFIX}.yml"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-daintree-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.appx
            release/*.msix
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.blockmap
            release/*.yml
          retention-days: 7
          if-no-files-found: error

  publish-daintree:
    if: startsWith(github.ref, 'refs/tags/v') && inputs.dry_run != true
    needs: [build-daintree]
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Resolve update metadata prefix
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$TAG_VERSION" == *-rc* ]]; then
            echo "UPDATE_METADATA_PREFIX=rc" >> "$GITHUB_ENV"
          elif [[ "$TAG_VERSION" == *-beta* ]]; then
            echo "UPDATE_METADATA_PREFIX=beta" >> "$GITHUB_ENV"
          else
            echo "UPDATE_METADATA_PREFIX=latest" >> "$GITHUB_ENV"
          fi

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-daintree-macos-14
          path: release/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-daintree-ubuntu-22.04
          path: release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-daintree-windows-latest
          path: release/

      - name: List release files
        run: ls -lah release/

      - name: Install gate dependencies
        shell: bash
        run: npm install --no-save --no-audit --no-fund --ignore-scripts js-yaml semver

      - name: Check version is monotonically increasing
        shell: bash
        env:
          UPDATE_METADATA_PREFIX: ${{ env.UPDATE_METADATA_PREFIX }}
        run: node scripts/ci/check-version-monotonic.mjs

      - name: Upload binaries to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.DAINTREE_R2_BUCKET }}
        run: |
          aws s3 sync release/ "s3://${R2_BUCKET}/releases/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-progress \
            --exclude "*" \
            --include "*.dmg" \
            --include "*.zip" \
            --include "*.appx" \
            --include "*.msix" \
            --include "*.exe" \
            --include "*.AppImage" \
            --include "*.deb" \
            --include "*.blockmap" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Verify binaries reachable on R2
        shell: bash
        env:
          PUBLISH_URL: https://updates.daintree.org/releases/
        run: node scripts/ci/verify-r2-uploads.mjs

      - name: Upload metadata to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.DAINTREE_R2_BUCKET }}
        run: |
          aws s3 sync release/ "s3://${R2_BUCKET}/releases/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --no-progress \
            --exclude "*" \
            --include "${UPDATE_METADATA_PREFIX}*.yml" \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Notify website of new release
        shell: bash
        env:
          WEBSITE_WEBHOOK_SECRET: ${{ secrets.WEBSITE_WEBHOOK_SECRET }}
        run: |
          sleep 1
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://daintree.org/api/refresh-releases \
            -H "Authorization: Bearer ${WEBSITE_WEBHOOK_SECRET}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response (HTTP ${HTTP_CODE}): ${BODY}"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::warning::Website refresh failed (HTTP ${HTTP_CODE})"
          fi
