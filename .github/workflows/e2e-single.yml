name: E2E Single Test

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Operating system to run on"
        type: choice
        default: windows
        options:
          - windows
          - linux
          - macos
          - all
      suite:
        description: "Playwright project / E2E suite"
        type: choice
        default: core
        options:
          - core
          - full
          - online
          - nightly
      test_file:
        description: "Spec file(s), separated by comma, space, or newline"
        type: string
        required: true
      grep:
        description: "Optional Playwright --grep value for matching tests"
        type: string
        default: ""
      workers:
        description: "Playwright worker count"
        type: string
        default: "1"
      retries:
        description: "Override Playwright retries; empty uses config retries"
        type: string
        default: "0"

permissions:
  contents: read

concurrency:
  group: e2e-single-${{ github.ref }}-${{ inputs.platform }}-${{ inputs.suite }}-${{ inputs.test_file }}-${{ inputs.grep }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  matrix-setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          PLATFORM="${{ inputs.platform }}"

          if [ "$PLATFORM" = "macos" ]; then
            echo 'matrix={"include":[{"os":"macos-14","name":"macOS"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" = "linux" ]; then
            echo 'matrix={"include":[{"os":"ubuntu-22.04","name":"Linux"}]}' >> "$GITHUB_OUTPUT"
          elif [ "$PLATFORM" = "windows" ]; then
            echo 'matrix={"include":[{"os":"windows-latest","name":"Windows"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"macos-14","name":"macOS"},{"os":"ubuntu-22.04","name":"Linux"},{"os":"windows-latest","name":"Windows"}]}' >> "$GITHUB_OUTPUT"
          fi

  e2e-single:
    needs: matrix-setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}
    name: ${{ inputs.suite }} single (${{ matrix.name }})
    timeout-minutes: 60

    steps:
      - name: Harden Windows for Electron E2E
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Stop-Service -Name "WSearch" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "WSearch" -StartupType Disabled -ErrorAction SilentlyContinue
          Stop-Service -Name "SysMain" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "SysMain" -StartupType Disabled -ErrorAction SilentlyContinue
          Stop-Service -Name "DiagTrack" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "DiagTrack" -StartupType Disabled -ErrorAction SilentlyContinue
          try {
            Set-DisplayResolution -Width 1920 -Height 1080 -Force -ErrorAction SilentlyContinue
          } catch {
            Write-Host "Set-DisplayResolution not available, continuing with default resolution"
          }

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libasound2 \
            libxss1 \
            libxtst6 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libnotify4 \
            xvfb

      - name: Fontconfig cache key
        id: fontconfig-cache-key
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/fontconfig
          source /etc/os-release
          echo "ubuntu=${ID}-${VERSION_ID}-${VERSION_CODENAME}" >> "$GITHUB_OUTPUT"
          echo "fc_version=$(fc-cache --version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"
          echo "font_pkg_hash=$(dpkg-query -W -f='${Package} ${Version}\n' 2>/dev/null | grep -E '^fonts-|^fontconfig' | LC_ALL=C sort | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache fontconfig
        id: cache-fontconfig
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: ~/.cache/fontconfig
          key: fontconfig-${{ runner.os }}-${{ runner.arch }}-${{ steps.fontconfig-cache-key.outputs.ubuntu }}-${{ steps.fontconfig-cache-key.outputs.fc_version }}-${{ steps.fontconfig-cache-key.outputs.font_pkg_hash }}

      - name: Warm fontconfig cache
        if: runner.os == 'Linux'
        run: fc-cache -fv

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: npm ci
        env:
          npm_config_msvs_version: "2022"

      - name: Install dependencies
        if: runner.os != 'Windows'
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install OpenCode
        if: inputs.suite == 'online'
        run: npm install -g opencode-ai

      - name: Configure Claude Code (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding": true}' > ~/.claude.json
          echo '{"model": "claude-haiku-4-5-20251001"}' > ~/.claude/settings.json

      - name: Configure Claude Code (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.claude" | Out-Null
          '{"hasCompletedOnboarding": true}' | Set-Content "$env:USERPROFILE\.claude.json"
          '{"model": "claude-haiku-4-5-20251001"}' | Set-Content "$env:USERPROFILE\.claude\settings.json"

      - name: Verify native modules (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          node -e "try { require('node-pty'); console.log('node-pty: OK') } catch(e) { console.error('node-pty FAILED:', e.message); process.exit(1) }"

      - name: Run single e2e test (macOS)
        if: runner.os == 'macOS'
        env:
          E2E_SUITE: ${{ inputs.suite }}
          E2E_TEST_FILE: ${{ inputs.test_file }}
          E2E_GREP: ${{ inputs.grep }}
          E2E_WORKERS: ${{ inputs.workers }}
          E2E_RETRIES: ${{ inputs.retries }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/ci/run-single-e2e.mjs

      - name: Run single e2e test (Linux)
        if: runner.os == 'Linux'
        env:
          E2E_SUITE: ${{ inputs.suite }}
          E2E_TEST_FILE: ${{ inputs.test_file }}
          E2E_GREP: ${{ inputs.grep }}
          E2E_WORKERS: ${{ inputs.workers }}
          E2E_RETRIES: ${{ inputs.retries }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: xvfb-run --auto-servernum node scripts/ci/run-single-e2e.mjs

      - name: Run single e2e test (Windows)
        if: runner.os == 'Windows'
        env:
          E2E_SUITE: ${{ inputs.suite }}
          E2E_TEST_FILE: ${{ inputs.test_file }}
          E2E_GREP: ${{ inputs.grep }}
          E2E_WORKERS: ${{ inputs.workers }}
          E2E_RETRIES: ${{ inputs.retries }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELECTRON_ENABLE_LOGGING: "1"
        run: node scripts/ci/run-single-e2e.mjs

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-single-${{ inputs.suite }}-${{ matrix.name }}-${{ github.sha }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
