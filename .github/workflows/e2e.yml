name: E2E Tests

# Distinguish manual-dispatch runs in the Actions list. Reusable-workflow
# callers (release-{macos,linux,windows}.yml, nightly.yml) keep their own
# parent run title; the matrix job names still make the suite visible inside
# the run.
run-name: ${{ inputs.suite || 'core' }} · ${{ inputs.platform || 'all' }}${{ inputs.test_file && format(' · {0}', inputs.test_file) || '' }}

# Unified runner for every E2E suite: core smoke, the six full-* domain
# buckets, online (agent integration), and nightly (memory-leak detection).
# Pick the suite via the `suite` input; everything else (OpenCode install,
# ANTHROPIC_API_KEY, --workers=1 for nightly) is conditional on that choice.
# Single-file runs are supported via `test_file`.
#
# Internally, `suite` is passed to Playwright as `--project=<suite>` because
# that's Playwright's term for the same concept (an entry in the `projects:`
# array of playwright.config.ts).
#
# Callers that pass `suite: online` MUST use `secrets: inherit` so
# ANTHROPIC_API_KEY is reachable inside the called workflow.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to test on"
        type: choice
        default: "all"
        options:
          - all
          - macos
          - linux
          - windows
          - non-windows
      test_file:
        description: "Single test file to run (e.g. e2e/full/terminal/core-terminal-search.spec.ts). Leave empty to run the entire suite."
        type: string
        default: ""
      suite:
        description: "Suite to run. `full` is a meta-suite that runs all six full-* buckets sequentially on one runner — handy for ad-hoc validation. Release and nightly fan the buckets out across separate runners instead."
        type: choice
        default: "full"
        options:
          - full
          - core
          - full-terminal
          - full-worktree
          - full-presets
          - full-platform
          - full-panels
          - full-resilience
          - online
          - nightly
  workflow_call:
    inputs:
      platform:
        description: "Platform to test on"
        type: string
        default: "all"
      test_file:
        description: "Single test file to run. Leave empty to run the entire suite."
        type: string
        default: ""
      suite:
        description: "Suite to run (full meta-suite, core, any full-* bucket, online, or nightly)"
        type: string
        default: "full"

permissions:
  contents: read

# Scope concurrency per (suite, platform, ref). The three per-OS release
# workflows (release-{macos,linux,windows}.yml) all call this for the same
# suite on the same ref, so a key that omits the platform collapses them
# into one group and cancel-in-progress: true makes them kill each other.
concurrency:
  group: e2e-${{ inputs.suite || 'core' }}-${{ inputs.platform || 'all' }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # Determine which platforms to run on, and fan each one out into N shards.
  #
  # Sharding (#8053): the six full-* domain buckets and the `full` meta-suite
  # split their spec list across SHARD_TOTAL parallel runners via Playwright's
  # native `--shard`. A 39-minute serial Windows bucket becomes ~10min
  # wall-time, and a hung shard takes out 1/N of the bucket instead of the
  # whole thing. core/online/nightly stay unsharded — online hits real APIs
  # (3 specs), and nightly's leak heuristic depends on serialized launches
  # (--workers=1); cross-runner sharding there would just add noise. A
  # single-file run (`test_file`) is one spec — no point sharding it.
  matrix-setup:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          set -euo pipefail
          PLATFORM="${{ inputs.platform || 'all' }}"
          SUITE="${{ inputs.suite || 'core' }}"
          TEST_FILE="${{ inputs.test_file }}"

          case "$PLATFORM" in
            macos)       OSES='[{"os":"macos-14","name":"macOS"}]' ;;
            linux)       OSES='[{"os":"ubuntu-22.04","name":"Linux"}]' ;;
            windows)     OSES='[{"os":"windows-latest","name":"Windows"}]' ;;
            non-windows) OSES='[{"os":"macos-14","name":"macOS"},{"os":"ubuntu-22.04","name":"Linux"}]' ;;
            *)           OSES='[{"os":"macos-14","name":"macOS"},{"os":"ubuntu-22.04","name":"Linux"},{"os":"windows-latest","name":"Windows"}]' ;;
          esac

          # Only the full-* buckets and the `full` meta-suite fan out. N=4 is
          # the tuned starting point from #8053 (39min → ~10min on Windows).
          case "$SUITE" in
            full|full-*) SHARD_TOTAL=4 ;;
            *)           SHARD_TOTAL=1 ;;
          esac
          if [ -n "$TEST_FILE" ]; then
            SHARD_TOTAL=1
          fi

          MATRIX=$(node -e '
            const oses = JSON.parse(process.argv[1]);
            const total = Number(process.argv[2]);
            const include = [];
            for (const o of oses) {
              for (let s = 1; s <= total; s++) {
                include.push({ ...o, shard: s, shardTotal: total });
              }
            }
            console.log(JSON.stringify({ include }));
          ' "$OSES" "$SHARD_TOTAL")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  e2e:
    needs: matrix-setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-setup.outputs.matrix) }}

    runs-on: ${{ matrix.os }}
    name: ${{ inputs.suite || 'core' }} (${{ matrix.name }}${{ matrix.shardTotal > 1 && format(' {0}/{1}', matrix.shard, matrix.shardTotal) || '' }})
    # Sharding shrinks the per-runner unit of work, so a hung shard should
    # fail fast and re-run cheaply rather than burn the old 180min ceiling
    # (the "core (Windows) hung past 53min" failure mode from #8053). nightly
    # is unsharded and its serialized leak suite legitimately runs long, so it
    # keeps the generous ceiling; `full` (meta — all six buckets on one
    # runner) gets a wider window than a single full-* shard.
    timeout-minutes: ${{ (inputs.suite == 'nightly' && 180) || (inputs.suite == 'full' && 120) || (startsWith(inputs.suite, 'full-') && 45) || 90 }}

    steps:
      - name: Harden Windows for Electron E2E
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Disable real-time monitoring entirely (exclusions alone are insufficient)
          Set-MpPreference -DisableRealtimeMonitoring $true

          # Disable Windows Search indexer to prevent file handle contention
          Stop-Service -Name "WSearch" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "WSearch" -StartupType Disabled -ErrorAction SilentlyContinue

          # Disable Superfetch/SysMain which can lock files during prefetch
          Stop-Service -Name "SysMain" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "SysMain" -StartupType Disabled -ErrorAction SilentlyContinue

          # Disable diagnostics tracking that scans new executables
          Stop-Service -Name "DiagTrack" -Force -ErrorAction SilentlyContinue
          Set-Service -Name "DiagTrack" -StartupType Disabled -ErrorAction SilentlyContinue

          # Set display resolution to 1920x1080 so toolbar buttons don't overflow
          $device = Get-CimInstance -ClassName Win32_VideoController | Select-Object -First 1
          try {
            Set-DisplayResolution -Width 1920 -Height 1080 -Force -ErrorAction SilentlyContinue
          } catch {
            Write-Host "Set-DisplayResolution not available, continuing with default resolution"
          }

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Cache Playwright browsers
        id: cache-playwright
        continue-on-error: true
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm1 \
            libgtk-3-0 \
            libnss3 \
            libasound2 \
            libxss1 \
            libxtst6 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libnotify4 \
            xvfb

      - name: Fontconfig cache key
        id: fontconfig-cache-key
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/fontconfig
          source /etc/os-release
          echo "ubuntu=${ID}-${VERSION_ID}-${VERSION_CODENAME}" >> "$GITHUB_OUTPUT"
          echo "fc_version=$(fc-cache --version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"
          echo "font_pkg_hash=$(dpkg-query -W -f='${Package} ${Version}\n' 2>/dev/null | grep -E '^fonts-|^fontconfig' | LC_ALL=C sort | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache fontconfig
        id: cache-fontconfig
        if: runner.os == 'Linux'
        uses: actions/cache@v5
        with:
          path: ~/.cache/fontconfig
          key: fontconfig-${{ runner.os }}-${{ runner.arch }}-${{ steps.fontconfig-cache-key.outputs.ubuntu }}-${{ steps.fontconfig-cache-key.outputs.fc_version }}-${{ steps.fontconfig-cache-key.outputs.font_pkg_hash }}

      - name: Warm fontconfig cache
        if: runner.os == 'Linux'
        run: fc-cache -fv

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install OpenCode
        if: inputs.suite == 'online'
        run: npm install -g opencode-ai

      - name: Configure Claude Code (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding": true}' > ~/.claude.json
          echo '{"model": "claude-haiku-4-5-20251001"}' > ~/.claude/settings.json

      - name: Configure Claude Code (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.claude" | Out-Null
          '{"hasCompletedOnboarding": true}' | Set-Content "$env:USERPROFILE\.claude.json"
          '{"model": "claude-haiku-4-5-20251001"}' | Set-Content "$env:USERPROFILE\.claude\settings.json"

      - name: Resolve test command
        id: test-cmd
        shell: bash
        run: |
          SUITE="${{ inputs.suite || 'core' }}"
          # `full` is a meta-suite that fans across all six full-* buckets in
          # one runner. Each Playwright project becomes its own --project flag.
          # Single-bucket / single-test runs use one --project flag instead.
          if [ "$SUITE" = "full" ]; then
            PROJECT_ARGS="--project=full-terminal --project=full-worktree --project=full-presets --project=full-platform --project=full-panels --project=full-resilience"
          else
            PROJECT_ARGS="--project=$SUITE"
          fi
          # The `nightly` suite's leak heuristic depends on serialized
          # launches; --workers=1 is mandatory.
          EXTRA=""
          if [ "$SUITE" = "nightly" ]; then
            EXTRA="--workers=1"
          fi
          if [ -n "${{ inputs.test_file }}" ]; then
            echo "args=$PROJECT_ARGS $EXTRA ${{ inputs.test_file }}" >> "$GITHUB_OUTPUT"
          else
            echo "args=$PROJECT_ARGS $EXTRA" >> "$GITHUB_OUTPUT"
          fi

      # Restore .last-run.json from the previous attempt so a job-level retry
      # (via "Re-run failed jobs") can scope to --last-failed and rerun only
      # the specs that failed before. Cache keys are immutable, so the save
      # key includes run_attempt; restore-keys strips that suffix to find the
      # prior attempt's entry. Missing on attempt 1 — that's expected. Note:
      # "Re-run all jobs" forces a fresh runner but doesn't preserve failure
      # context — that path bypasses --last-failed and reruns the full suite,
      # which is correct (the user asked for a clean rerun).
      - name: Restore Playwright last-run results
        if: github.run_attempt > 1
        uses: actions/cache/restore@v5
        with:
          path: test-results/.last-run.json
          # Scoped per-shard: each shard writes its own .last-run.json, so the
          # restore must not bleed one shard's failures into another. (#8053)
          key: e2e-last-run-${{ runner.os }}-${{ runner.arch }}-${{ inputs.suite || 'core' }}-s${{ matrix.shard }}of${{ matrix.shardTotal }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            e2e-last-run-${{ runner.os }}-${{ runner.arch }}-${{ inputs.suite || 'core' }}-s${{ matrix.shard }}of${{ matrix.shardTotal }}-${{ github.run_id }}-

      # Single source of truth for the shard slice and the retry gate.
      # Exporting via $GITHUB_ENV keeps the three OS run steps below identical
      # and prevents drift.
      - name: Resolve shard and --last-failed args
        shell: bash
        run: |
          set -euo pipefail
          SUITE="${{ inputs.suite || 'core' }}"
          SHARD_INDEX="${{ matrix.shard }}"
          SHARD_TOTAL="${{ matrix.shardTotal }}"

          LAST_FAILED_ARGS=""
          # Append --last-failed only on retries that (a) restored the prior
          # attempt's results, (b) target a suite with meaningful retry
          # semantics, and (c) aren't already scoped to a single test file.
          if [ "${{ github.run_attempt }}" -gt 1 ] \
             && [ -f test-results/.last-run.json ] \
             && [ "$SUITE" != "nightly" ] \
             && [ "$SUITE" != "online" ] \
             && [ -z "${{ inputs.test_file }}" ]; then
            LAST_FAILED_ARGS="--last-failed"
            echo "[e2e] Retry attempt ${{ github.run_attempt }} — running with --last-failed"
          fi

          SHARD_ARGS=""
          if [ "$SHARD_TOTAL" -gt 1 ]; then
            if [ -n "$LAST_FAILED_ARGS" ]; then
              # This shard's restored .last-run.json already contains only the
              # specs THIS shard executed. Re-applying --shard would re-slice
              # that tiny failed-only list by round-robin index — a 1-test list
              # lands entirely on shard 1, starving every other shard's retry.
              # Drop --shard and let --last-failed rerun exactly this shard's
              # failures. (#8053)
              echo "[e2e] Retry with --last-failed — dropping --shard for this attempt"
            else
              SHARD_ARGS="--shard=$SHARD_INDEX/$SHARD_TOTAL"
              echo "[e2e] Sharded run — slice $SHARD_INDEX of $SHARD_TOTAL"
            fi
          fi

          echo "LAST_FAILED_ARGS=$LAST_FAILED_ARGS" >> "$GITHUB_ENV"
          echo "SHARD_ARGS=$SHARD_ARGS" >> "$GITHUB_ENV"

      - name: Run ${{ inputs.suite || 'core' }} e2e tests (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          # Required for `online`; harmless empty string for other projects
          # when secrets aren't inherited.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          npx playwright test ${{ steps.test-cmd.outputs.args }} ${SHARD_ARGS:-} ${LAST_FAILED_ARGS:-}

      - name: Run ${{ inputs.suite || 'core' }} e2e tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          xvfb-run --auto-servernum npx playwright test ${{ steps.test-cmd.outputs.args }} ${SHARD_ARGS:-} ${LAST_FAILED_ARGS:-}

      - name: Verify native modules (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          node -e "try { require('node-pty'); console.log('node-pty: OK') } catch(e) { console.error('node-pty FAILED:', e.message); process.exit(1) }"

      - name: Run ${{ inputs.suite || 'core' }} e2e tests (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          ELECTRON_ENABLE_LOGGING: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail

          while true; do
            sleep 60
            echo "[e2e] heartbeat $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          done &
          heartbeat_pid=$!
          trap 'kill "$heartbeat_pid" 2>/dev/null || true' EXIT

          npx playwright test ${{ steps.test-cmd.outputs.args }} ${SHARD_ARGS:-} ${LAST_FAILED_ARGS:-}

      # Persist .last-run.json for a potential job-level retry. Runs even on
      # Playwright failure (if: always()) — that's precisely when the retry
      # needs the prior attempt's results to scope to --last-failed.
      - name: Save Playwright last-run results
        if: always()
        uses: actions/cache/save@v5
        with:
          path: test-results/.last-run.json
          key: e2e-last-run-${{ runner.os }}-${{ runner.arch }}-${{ inputs.suite || 'core' }}-s${{ matrix.shard }}of${{ matrix.shardTotal }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-${{ inputs.suite || 'core' }}-results-${{ matrix.name }}-s${{ matrix.shard }}of${{ matrix.shardTotal }}-${{ github.sha }}-attempt-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore
