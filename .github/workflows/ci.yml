name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      os:
        description: "OS to run check on (manual dispatch only — push/PR always runs ubuntu)"
        type: choice
        options:
          - ubuntu
          - windows
          - both
        default: ubuntu

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # Combined typecheck + lint + format + unit-test job. Previously these were
  # two separate jobs (check + test) running in parallel; folding them into
  # one amortises the per-job setup cost (checkout, Node, npm ci) at the cost
  # of slightly higher wall-clock per run. At this commit volume that's the
  # right trade — we run a lot of pushes and pay setup once instead of twice.
  check:
    # Push/PR runs ubuntu only. Manual dispatch can opt into windows or both
    # via `gh workflow run CI --ref <branch> -f os=windows` (or `os=both`).
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON((inputs.os || 'ubuntu') == 'both' && '["ubuntu-latest","windows-latest"]' || (inputs.os || 'ubuntu') == 'windows' && '["windows-latest"]' || '["ubuntu-latest"]') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Check (typecheck + lint + format)
        run: npm run check

      - name: Test (vitest unit)
        run: npm run test

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools

      - name: Fontconfig cache key
        id: fontconfig-cache-key
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/fontconfig
          source /etc/os-release
          echo "ubuntu=${ID}-${VERSION_ID}-${VERSION_CODENAME}" >> "$GITHUB_OUTPUT"
          echo "fc_version=$(fc-cache --version 2>&1 | head -1)" >> "$GITHUB_OUTPUT"
          echo "font_pkg_hash=$(dpkg-query -W -f='${Package} ${Version}\n' 2>/dev/null | grep -E '^fonts-|^fontconfig' | LC_ALL=C sort | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache fontconfig
        id: cache-fontconfig
        uses: actions/cache@v5
        with:
          path: ~/.cache/fontconfig
          key: fontconfig-${{ runner.os }}-${{ runner.arch }}-${{ steps.fontconfig-cache-key.outputs.ubuntu }}-${{ steps.fontconfig-cache-key.outputs.fc_version }}-${{ steps.fontconfig-cache-key.outputs.font_pkg_hash }}

      - name: Warm fontconfig cache
        run: fc-cache -fv

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Renderer import budget
        run: npm run renderer-import-budget:check

      - name: Smoke test
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: xvfb-run --auto-servernum npm run test:smoke
        env:
          NODE_ENV: production
          ELECTRON_ENABLE_LOGGING: "1"
          SMOKE_RUNS: "1"
          SMOKE_TIMEOUT_MS: "210000"
        timeout-minutes: 6

  # Gate job — use this as the sole required status check in branch protection.
  # Insulates against matrix/job name changes breaking required checks.
  ci-ok:
    if: always()
    needs: [check, build]
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Check results
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
